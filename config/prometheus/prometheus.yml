global:
  scrape_interval: 10s
  external_labels:
    project: ticket-sales-distributed

scrape_configs:
  - job_name: producer
    static_configs:
      - targets: ["producer:8000"]
    metrics_path: /metrics

  - job_name: payment-worker
    static_configs:
      - targets: ["payment-worker:9101"]

  - job_name: stock-worker
    static_configs:
      - targets: ["stock-worker:9102"]

  - job_name: notification-worker
    static_configs:
      - targets: ["notification-worker:9103"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
    scrape_interval: 5s
